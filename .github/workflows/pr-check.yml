name: PR Check

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  clang-format:
    name: Code formatting
    runs-on: ubuntu-latest

    steps:
      - name: Install clang-format-19
        run: |
          sudo apt update
          sudo apt install -y clang-format-19

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check formatting
        run: |
          clang-format-19 --dry-run --Werror $(git ls-files '*.c' '*.h')

  build-check:
    name: Build check (warnings as errors)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (strict)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-Wall -Wextra -Werror" \
            -DSN_THREADS_BUILD_TEST=ON

      - name: Build
        run: cmake --build build

  sanitize:
    name: Sanitize check (ASan+UBSan)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure (sanitizers)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -fno-sanitize-recover=all" \
            -DSN_THREADS_BUILD_TEST=ON

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build/test --output-on-failure --timeout 30 -C Debug -V
