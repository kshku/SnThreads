name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
            cmake_generator: "Unix Makefiles"
          - os: macos-latest
            cc: clang
            cmake_generator: "Unix Makefiles"
          - os: windows-latest
            cc: cl
            cmake_generator: "Visual Studio 17 2022"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: |
          cmake -B build \
            -G "${{ matrix.cmake_generator }}" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DSN_THREADS_BUILD_TEST=ON
        shell: bash

      - name: Build
        run: cmake --build build --config Debug

      - name: Run tests
        run: ctest --test-dir build/test --output-on-failure --timeout 30 -C Debug -V
        shell: bash
